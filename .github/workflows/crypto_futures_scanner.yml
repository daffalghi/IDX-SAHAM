name: Crypto Futures 4H Scanner

on:
  push:
    branches:
      - master
  schedule:
    # Berjalan setiap 1 jam sekali di menit ke-0
    - cron: '0 * * * *'
  workflow_dispatch: # Izinkan eksekusi manual via tombol "Run workflow"

jobs:
  crypto_scan:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Upgrade PIP
      run: python -m pip install --upgrade pip
      
    - name: Install Core & Data Libraries
      run: pip install "numpy<2.0" pandas requests python-dotenv schedule
      
    - name: Install Financial APIs (yfinance, ccxt)
      run: pip install yfinance ccxt
      
    - name: Install Technical Indicators (pandas-ta) & NLP
      run: pip install pandas-ta vaderSentiment
        
    - name: Jalankan Pemindai Kripto Binance
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        GITHUB_ACTIONS: "true"
      run: |
        python binance_scanner.py
