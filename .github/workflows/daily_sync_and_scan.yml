name: Daily IDX Sync and AI Scan

on:
  schedule:
    # Cron format: Berjalan setiap jam 09:30 UTC (Setara dengan 16:30 WIB)
    # Berlaku dari hari Senin (1) hingga Jumat (5)
    - cron: '30 9 * * 1-5'
  workflow_dispatch: # Mengizinkan untuk di-klik manual ("Run workflow") dari website GitHub

permissions:
  contents: write

jobs:
  sync_and_scan:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Deno
      uses: denoland/setup-deno@v2
      with:
        deno-version: v1.x

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    # Cache pip dependencies — hemat 3-5 menit setelah pertama kali run
    # Cache akan di-refresh otomatis jika requirements.txt berubah
    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Jalankan AI Auto Scanner & Kirim ke Telegram
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        python -c "from auto_scanner import run_auto_scan; run_auto_scan()"
        
    - name: Commit Database Terbaru ke GitHub Repository
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        # Hapus flag ignore jika data folder masuk ke .gitignore sebelumnya
        git add -f IDX-API/data/database.sqlite
        git commit -m "Auto-update DB & AI Scan: $(date +'%Y-%m-%d')" || exit 0
        git push
